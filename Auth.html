<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sleep</title>
  <style>
    :root{
      --bg0:#06080f;
      --bg1:#0b1222;
      --green:#22c55e;
      --white:#eaf2ff;
      --muted:rgba(234,242,255,.72);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      background: linear-gradient(180deg, var(--bg1), var(--bg0));
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--white);
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:-40px;
      background:
        radial-gradient(900px 500px at 50% 20%, rgba(34,197,94,.18), transparent 60%),
        radial-gradient(700px 380px at 20% 85%, rgba(59,130,246,.10), transparent 60%),
        radial-gradient(600px 320px at 90% 80%, rgba(236,72,153,.06), transparent 60%);
      pointer-events:none;
      filter:saturate(110%);
    }

    .frame{
      width:min(980px, 100%);
      border:0;
      border-radius:0;
      background:transparent;
      box-shadow:none;
      padding:0;
      position:relative;
    }

    .content{ text-align:center; }

    /* Bigger text */
    h1{
      margin:0;
      font-size: clamp(44px, 6.6vw, 74px);
      font-weight: 800;
      letter-spacing: .2px;
      color: var(--green);
      text-shadow: 0 1px 0 rgba(0,0,0,.35);
    }

    p{
      margin: 16px 0 0;
      font-size: clamp(18px, 2.8vw, 22px);
      line-height: 1.5;
      color: var(--muted);
    }

    .caps{ text-transform: capitalize; }
  </style>
</head>
<body>
  <section class="frame" aria-label="Sleep Page">
    <div class="content">
      <h1 class="caps">Device Authenticated</h1>

      <p class="caps">
        You Should Of Been Brought This Website By A Url Shorter Make Sure The Qr Code Says Bit.Ly
      </p>
    </div>
  </section>
</body>
</html>
